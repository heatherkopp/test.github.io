<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    {% include head-custom.html %}
  </head>

  <body>

    <div class="wrapper">

      <header>

        <h1 class="site-title">
          <a href="{{ '/' | relative_url }}">
            {{ site.title }}
          </a>
        </h1>

        <nav class="site-nav">
          <ul>
            <li><a href="{{ '/CV' | relative_url }}">CV</a></li>
            <li><a href="{{ '/Research' | relative_url }}">Research</a></li>
            <li><a href="{{ '/Teaching' | relative_url }}">Teaching</a></li>
            <li><a href="{{ '/Contact' | relative_url }}">Contact</a></li>
          </ul>
        </nav>

        {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-image">
        {% endif %}

<p class="site-description">
  {{ site.description }}
</p>

<div class="social-links">

  <a href="https://scholar.google.com/citations?user=u6EcVJoAAAAJ&hl"
     target="_blank"
     class="scholar-link">

    <img src="{{ '/assets/images/google-scholar.png' | relative_url }}"
         alt="Google Scholar"
         class="scholar-icon">

    Google Scholar
  </a>
 <br>

  <!-- ORCID -->
  <a href="https://orcid.org/0000-0003-2606-7089"
     target="_blank"
     class="scholar-link">

    <img src="{{ '/assets/images/orcid.png' | relative_url }}"
         alt="ORCID"
         class="scholar-icon">

    ORCID
  </a>
<br>

<a href="https://x.com/hmkopp6"
   target="_blank"
   class="scholar-link">

  <img src="{{ '/assets/images/x.png' | relative_url }}"
       alt="X"
       class="scholar-icon">

  X
</a>
  <br>

<a href="https://bsky.app/profile/hmkopp6.bsky.social"
   target="_blank"
   class="scholar-link">

  <img src="{{ '/assets/images/bluesky.png' | relative_url }}"
       alt="Blue Sky"
       class="scholar-icon">

  Blue Sky
</a>
</div>
      </header>

      <section>
        {{ content }}
      </section>

    </div>

    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>

  </body>
</html>
