<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    {% include head-custom.html %}
  </head>

  <body>

    <div class="wrapper">

      <header>

        <h1 class="site-title">
          <a href="{{ '/' | relative_url }}">
            {{ site.title }}
          </a>
        </h1>

        <nav class="site-nav">
          <ul>
            <li><a href="{{ '/CV' | relative_url }}">CV</a></li>
            <li><a href="{{ '/Research' | relative_url }}">Research</a></li>
            <li><a href="{{ '/Teaching' | relative_url }}">Teaching</a></li>
            <li><a href="{{ '/Contact' | relative_url }}">Contact</a></li>
          </ul>
        </nav>

        {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-image">
        {% endif %}

<p class="site-description">
  {{ site.description }}
</p>

<div class="social-links">

  <a href="https://scholar.google.com/citations?user=u6EcVJoAAAAJ&hl"
     target="_blank">

    <img src="{{ '/assets/images/google-scholar.png' | relative_url }}"
         alt="Google Scholar"
         style="width:18px; height:18px; vertical-align:middle;">

    Google Scholar
  </a>

</div>
      </header>

      <section>
        {{ content }}
      </section>

    </div>

    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>

  </body>
</html>
