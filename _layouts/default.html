<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}

  <link rel="stylesheet"
    href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

  {% include head-custom.html %}
</head>

<body>

  <header class="site-header">

    <!-- NAME -->
    <h1 class="site-title">
      <a href="{{ '/' | absolute_url }}">
        {{ site.title | default: site.github.repository_name }}
      </a>
    </h1>

    <!-- NAVIGATION -->
    <nav class="site-nav">
      <ul>
        <li><a href="{{ '/CV' | relative_url }}">CV</a></li>
        <li><a href="{{ '/Research' | relative_url }}">Research</a></li>
        <li><a href="{{ '/Teaching' | relative_url }}">Teaching</a></li>
        <li><a href="{{ '/Contact' | relative_url }}">Contact</a></li>
      </ul>
    </nav>

  </header>

  <!-- MAIN PAGE CONTENT -->
  <main>

    {% if site.logo %}
      <img src="{{ site.logo | relative_url }}" alt="Logo" class="profile-image">
    {% endif %}

    <p>{{ site.description | default: site.github.project_tagline }}</p>

    {{ content }}

  </main>

  <footer>
  </footer>

  <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>

</body>
</html>
